services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidwise
      POSTGRES_USER: bidwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidwise"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in the root .env file}
      DATABASE_URL: postgresql+psycopg://bidwise:${POSTGRES_PASSWORD:-local-development-only}@database:5432/bidwise
      CORS_ORIGINS: http://localhost:3000
      COOKIE_SECURE: "false"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_FAST_MODEL: ${GEMINI_FAST_MODEL:-gemini-2.0-flash}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-3}
      AI_CHUNK_CHARS: ${AI_CHUNK_CHARS:-24000}
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@bidwise.ai}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, json, sys; r = urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0 if json.loads(r.read()).get('database') == 'connected' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  reminder-worker:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "reminder_worker"]
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in the root .env file}
      DATABASE_URL: postgresql+psycopg://bidwise:${POSTGRES_PASSWORD:-local-development-only}@database:5432/bidwise
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@bidwise.ai}
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
