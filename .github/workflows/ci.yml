name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SECRET_KEY: ci-secret-key-not-used-in-tests
  DATABASE_URL: sqlite:///./test.db

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Install Python deps
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Check migrations
        run: alembic check

      - name: Run tests
        run: pytest -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint 2>/dev/null || echo "No lint script configured"

      - name: Build
        run: npm run build

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          tags: bidwise-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          tags: bidwise-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
